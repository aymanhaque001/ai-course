site_name: 'Complete AI & Machine Learning Course'
site_description: 'From mathematical foundations to production AI systems — a comprehensive, self-paced curriculum'
site_url: 'https://aymanhaque001.github.io/ai-course/'
repo_url: 'https://github.com/aymanhaque001/ai-course'
repo_name: 'aymanhaque001/ai-course'

docs_dir: docs

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: ''

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - https://unpkg.com/katex@0.16.10/dist/katex.min.js
  - https://unpkg.com/katex@0.16.10/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0.16.10/dist/katex.min.css

extra:
  social: []

nav:
  - Home: index.md
  - Foundations:
      - '11 — Math & Statistics': module-11-math-foundations/README.md
      - '12 — Classical Machine Learning': module-12-classical-ml/README.md
      - '13 — Deep Learning (Pre-Transformer)': module-13-deep-learning/README.md
  - Core LLM Stack:
      - '01 — Neural Network Foundations': module-01-foundations/README.md
      - '02 — Transformer Architecture': module-02-transformers/README.md
      - '03 — Tokenization & Embeddings': module-03-tokenization-embeddings/README.md
      - '04 — Training LLMs': module-04-training/README.md
      - '05 — Prompt Engineering': module-05-prompt-engineering/README.md
      - '06 — Retrieval-Augmented Generation': module-06-rag/README.md
      - '07 — Evaluation & Benchmarks': module-07-evaluation/README.md
      - '08 — Scaling & Inference': module-08-scaling/README.md
      - '09 — Safety & Alignment': module-09-safety-alignment/README.md
      - '10 — Advanced Topics': module-10-advanced/README.md
  - Beyond LLMs:
      - '14 — Generative AI': module-14-generative-ai/README.md
  - Production:
      - '15 — MLOps & Production ML': module-15-mlops/README.md
      - '16 — AI Systems Design': module-16-ai-systems-design/README.md
  - Interview Prep:
      - '17 — LeetCode for AI Engineers': module-17-leetcode-interview-prep/README.md

exclude_docs: |
  mkdocs.yml
  requirements.txt
  .github/
  .gitignore
  LICENSE
